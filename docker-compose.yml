version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    command: sh -c "until php artisan migrate --force; do echo 'wait db'; sleep 3; done; php artisan db:seed --force || true; php artisan l5-swagger:generate || true; php artisan serve --host=0.0.0.0 --port=8000"
    environment:
      APP_NAME: "Catalog Service"
      APP_ENV: local
      APP_KEY: base64:3p83O1g9Fk72V4q8Xg50bHw1R2z5N4Y7U2g9L9s1F1g=
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: catalogroom
      DB_USERNAME: root
      DB_PASSWORD: root
      IAE_API_KEY: 102022400306
    depends_on:
      - db
    networks:
      - catalog-network

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: catalogroom
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - catalog-network

  phpmyadmin:
    image: phpmyadmin:latest
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      - PMA_ARBITRARY=1
      - PMA_HOST=db
    depends_on:
      - db
    networks:
      - catalog-network


networks:
  catalog-network:
    driver: bridge

volumes:
  dbdata:
